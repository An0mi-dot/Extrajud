<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EXTRATJUD — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{ --bg:#f5fbf8; --fg:#0f1720; --muted:#6b7280; --accent:#10b981 }
html,body{ height:100%; margin:0; font-family:'Inter',sans-serif; background:linear-gradient(180deg,var(--bg),#f0faf2); color:var(--fg); }
.loader-wrap{height:100%; display:flex; align-items:center; justify-content:center;}
.card{background: #fff; border-radius:18px; padding:36px 46px; box-shadow: 0 30px 60px rgba(16,24,32,0.06); max-width:760px; width:88%; display:flex; gap:28px; align-items:center;}
.brand-left{display:flex; flex-direction:column; gap:6px;}
.logo-circle{width:96px; height:96px; border-radius:20px; display:flex; align-items:center; justify-content:center; background:rgba(16,185,129,0.06);}
.logo-circle img{width:72px; height:72px; object-fit:contain}
.title{font-family:'Rajdhani',sans-serif; font-size:28px; letter-spacing:1px; color:var(--fg)}
.subtitle{color:var(--muted); font-size:13px}
.progress-area{flex:1}
.progress-track{height:12px; background: #eef7f1; border-radius:8px; overflow:hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);}
.progress-bar{width:0%; height:100%; background:var(--accent); border-radius:8px; transition: width 700ms cubic-bezier(0.2,0.9,0.2,1)}
.progress-meta{display:flex; justify-content:space-between; align-items:center; margin-top:12px}
.small-text{font-size:13px; color:var(--muted)}
.spinner-dots{display:flex; gap:6px; align-items:center}
.dot{width:10px; height:10px; background:var(--accent); border-radius:50%; opacity:0.2; transform: translateY(0); animation:dotPulse 1s infinite ease-in-out}
.dot:nth-child(1){animation-delay:0s}
.dot:nth-child(2){animation-delay:0.12s}
.dot:nth-child(3){animation-delay:0.24s}
@keyframes dotPulse{0%{opacity:0.18; transform:translateY(0)}50%{opacity:1; transform:translateY(-6px)}100%{opacity:0.18; transform:translateY(0)}}
/* decorative background */
.bg-ornament{position:fixed; right:-120px; top:-80px; width:360px; height:360px; background:radial-gradient(circle at 20% 30%, rgba(16,185,129,0.06), transparent 20%), radial-gradient(circle at 80% 70%, rgba(52,211,153,0.04), transparent 30%); border-radius:50%; filter:blur(12px); z-index:0}
@media(max-width:720px){ .card{flex-direction:column; padding:28px} .logo-circle{width:84px;height:84px} .title{font-size:22px} }
</style>
</head>
<body>
<div class="bg-ornament" aria-hidden="true"></div>
<div class="loader-wrap">
  <div class="card" role="status" aria-live="polite">
    <div class="brand-left">
      <div class="logo-circle"><img src="assets/logo.png" alt="Logo"></div>
      <div class="title">EXTRATJUD</div>
      <div class="subtitle">Carregando a interface — tudo pronto em instantes</div>
    </div>
    <div class="progress-area">
      <div class="progress-track" aria-hidden="true"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-meta">
        <div class="small-text">Inicializando módulos</div>
        <div class="spinner-dots" aria-hidden="true">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// Gentle simulated progress to make loading feel alive; callers can set progress via window.setLoadingProgress(n)
(function(){
  const bar = document.getElementById('progressBar');
  let value = 0;
  function step(){
    value += Math.random()*12 + 6; // variable increment
    if(value >= 100) value = 100;
    bar.style.width = value + '%';
    if(value < 100) setTimeout(step, 420 + Math.random()*220);
  }
  setTimeout(step,200);
  window.setLoadingProgress = (n)=>{ value = Math.max(0, Math.min(100, Number(n)||0)); bar.style.width = value+'%'; }
})();
</script>
</body>
</html>
