<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTRATJUD - Database Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/theme.css">
    <script src="assets/theme.js"></script>
    <script src="assets/dialogs.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .db-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .db-header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            margin: 0;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .db-header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-back {
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-back:hover {
            background: var(--primary-hover);
        }

        .container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .table-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 8px 24px rgba(16,185,129,0.1);
            transform: translateY(-2px);
        }

        .table-card h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            color: var(--primary-color);
            font-family: 'JetBrains Mono', monospace;
        }

        .table-card p {
            margin: 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .table-view {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: none;
        }

        .table-view.active {
            display: block;
        }

        .table-view h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .back-to-tables {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 8px 0;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-to-tables:hover {
            color: var(--primary-color);
        }

        .table-toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-action {
            padding: 10px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: var(--primary-hover);
        }

        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead {
            background: rgba(16, 185, 129, 0.05);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--primary-color);
            font-family: 'JetBrains Mono', monospace;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            word-break: break-word;
        }

        tbody tr:hover {
            background: rgba(16, 185, 129, 0.03);
        }

        .cell-actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 6px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn-edit {
            background: rgba(16, 185, 129, 0.2);
            color: var(--primary-color);
        }

        .btn-edit:hover {
            background: rgba(16, 185, 129, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 16px;
            display: block;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 32px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .modal-header h2 {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary-color);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background: rgba(0,0,0,0.1);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            gap: 12px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ═══════════════════════════════════════════════════════════
           RESPONSIVE DESIGN
           ═══════════════════════════════════════════════════════════ */

        @media (max-width: 1024px) {
            .container {
                padding: 25px;
            }
            .tables-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .db-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            .container {
                padding: 20px;
            }
            .tables-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px 12px;
            }
            .table-wrapper {
                overflow-x: auto;
            }
        }

        @media (max-width: 480px) {
            .db-header {
                padding: 15px 20px;
            }
            .db-header h1 {
                font-size: 18px;
            }
            .container {
                padding: 15px;
            }
            .tables-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .modal-content {
                width: 95%;
                padding: 20px;
            }
            .table-wrapper {
                border: none;
            }
            table {
                font-size: 11px;
            }
            th, td {
                padding: 6px 8px;
            }
            .cell-actions {
                flex-direction: column;
            }
            .btn-edit, .btn-delete {
                width: 100%;
                padding: 6px 8px;
            }
        }

        @media (min-width: 1600px) {
            .container {
                padding: 50px;
                max-width: 1600px;
            }
            .tables-grid {
                grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="db-header">
        <h1><i class="fa-solid fa-database"></i> Database Viewer</h1>
        <div class="db-header-actions">
            <button class="btn-back" id="btn-back-home">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Tables Grid View -->
        <div id="tables-grid-view" class="tables-grid"></div>

        <!-- Table Details View -->
        <div id="table-details-view"></div>
    </div>

    <!-- Modal for Create/Edit -->
    <div id="record-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Novo Registro</h2>
                <button class="modal-close" id="btn-close-modal">&times;</button>
            </div>
            <form id="record-form"></form>
            <div class="modal-footer">
                <button class="btn-secondary" id="btn-cancel-form">Cancelar</button>
                <button class="btn-primary" id="btn-save-form">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './assets/supabaseClient.js';

        let currentTable = null;
        let currentEditingRecord = null;
        let allTables = [
            { name: 'user_roles', label: 'Usuários & Cargos' },
            { name: 'subsidios_trabalhistas', label: 'Subsídios Trabalhistas' },
            { name: 'solicitacoes_preventivo', label: 'Solicitações Preventivas' }
        ];

        const tablesGridView = document.getElementById('tables-grid-view');
        const tableDetailsView = document.getElementById('table-details-view');
        const recordModal = document.getElementById('record-modal');
        const btnBackHome = document.getElementById('btn-back-home');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const btnCancelForm = document.getElementById('btn-cancel-form');
        const btnSaveForm = document.getElementById('btn-save-form');
        const recordForm = document.getElementById('record-form');

        // Verificar se é admin
        async function checkAdminAccess() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'startup.html';
                return false;
            }

            const { data: roleData } = await supabase
                .from('user_roles')
                .select('cargo')
                .eq('user_email', session.user.email)
                .single();

            if (!roleData || roleData.cargo.toLowerCase() !== 'admin') {
                await ipcAlert('Acesso negado. Apenas administradores podem usar essa ferramenta.');
                window.location.href = 'index.html';
                return false;
            }

            return true;
        }

        // Init
        window.addEventListener('DOMContentLoaded', async () => {
            if (!await checkAdminAccess()) return;
            
            renderTables();
            
            btnBackHome.onclick = () => window.location.href = 'index.html';
            btnCloseModal.onclick = () => recordModal.classList.remove('active');
            btnCancelForm.onclick = () => recordModal.classList.remove('active');
            recordModal.onclick = (e) => {
                if (e.target === recordModal) recordModal.classList.remove('active');
            };
        });

        function renderTables() {
            tablesGridView.innerHTML = '';
            allTables.forEach(table => {
                const card = document.createElement('div');
                card.className = 'table-card';
                card.innerHTML = `
                    <h3><i class="fa-solid fa-table"></i> ${table.name}</h3>
                    <p>${table.label}</p>
                `;
                card.onclick = () => viewTable(table.name);
                tablesGridView.appendChild(card);
            });
        }

        async function viewTable(tableName) {
            currentTable = tableName;
            tablesGridView.style.display = 'none';
            tableDetailsView.innerHTML = `
                <div class="table-view active">
                    <div class="back-to-tables" onclick="location.reload()">
                        <i class="fa-solid fa-arrow-left"></i> Voltar
                    </div>
                    <h2><i class="fa-solid fa-table"></i> ${tableName}</h2>
                    <div class="table-toolbar">
                        <button class="btn-action" onclick="createNewRecord()">
                            <i class="fa-solid fa-plus"></i> Novo Registro
                        </button>
                    </div>
                    <div class="loading">
                        <div class="spinner"></div> Carregando...
                    </div>
                </div>
            `;

            try {
                const { data, error } = await supabase.from(tableName).select('*');
                if (error) throw error;

                displayTableData(tableName, data || []);
            } catch (err) {
                tableDetailsView.innerHTML = `
                    <div class="table-view active">
                        <div class="back-to-tables" onclick="location.reload()">
                            <i class="fa-solid fa-arrow-left"></i> Voltar
                        </div>
                        <div class="empty-state">
                            <i class="fa-solid fa-exclamation-circle"></i>
                            <p>Erro ao carregar: ${err.message}</p>
                        </div>
                    </div>
                `;
            }
        }

        function displayTableData(tableName, records) {
            if (records.length === 0) {
                tableDetailsView.innerHTML = `
                    <div class="table-view active">
                        <div class="back-to-tables" onclick="location.reload()">
                            <i class="fa-solid fa-arrow-left"></i> Voltar
                        </div>
                        <h2><i class="fa-solid fa-table"></i> ${tableName}</h2>
                        <div class="table-toolbar">
                            <button class="btn-action" onclick="createNewRecord()">
                                <i class="fa-solid fa-plus"></i> Novo Registro
                            </button>
                        </div>
                        <div class="empty-state">
                            <i class="fa-solid fa-inbox"></i>
                            <p>Nenhum registro encontrado</p>
                        </div>
                    </div>
                `;
                return;
            }

            const columns = Object.keys(records[0]);
            let html = `
                <div class="table-view active">
                    <div class="back-to-tables" onclick="location.reload()">
                        <i class="fa-solid fa-arrow-left"></i> Voltar
                    </div>
                    <h2><i class="fa-solid fa-table"></i> ${tableName}</h2>
                    <div class="table-toolbar">
                        <button class="btn-action" onclick="createNewRecord()">
                            <i class="fa-solid fa-plus"></i> Novo Registro
                        </button>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    ${columns.map(col => `<th>${col}</th>`).join('')}
                                    <th style="width: 120px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${records.map((record, idx) => `
                                    <tr>
                                        ${columns.map(col => {
                                            let val = record[col];
                                            if (typeof val === 'object') val = JSON.stringify(val);
                                            if (typeof val === 'string' && val.length > 50) val = val.substring(0, 47) + '...';
                                            return `<td>${val || '-'}</td>`;
                                        }).join('')}
                                        <td>
                                            <div class="cell-actions">
                                                <button class="btn-edit" onclick="editRecord(${idx})">Editar</button>
                                                <button class="btn-delete" onclick="deleteRecord(${idx})">Deletar</button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            tableDetailsView.innerHTML = html;

            // Attach event listeners
            window.editRecord = (idx) => showEditModal(records[idx], columns);
            window.deleteRecord = (idx) => deleteRecordHandler(records[idx], tableName);
            window.createNewRecord = () => showCreateModal(columns);
        }

        function showCreateModal(columns) {
            currentEditingRecord = null;
            document.getElementById('modal-title').textContent = 'Novo Registro';
            recordForm.innerHTML = '';

            columns.forEach(col => {
                if (col === 'id' || col === 'created_at' || col === 'updated_at') return;
                recordForm.innerHTML += `
                    <div class="form-group">
                        <label>${col}</label>
                        <input type="text" name="${col}" placeholder="${col}" />
                    </div>
                `;
            });

            btnSaveForm.onclick = () => saveRecord(columns);
            recordModal.classList.add('active');
        }

        function showEditModal(record, columns) {
            currentEditingRecord = record;
            document.getElementById('modal-title').textContent = 'Editar Registro';
            recordForm.innerHTML = '';

            columns.forEach(col => {
                if (col === 'id') return;
                const val = record[col] || '';
                recordForm.innerHTML += `
                    <div class="form-group">
                        <label>${col}</label>
                        <input type="text" name="${col}" value="${val}" placeholder="${col}" ${col === 'created_at' || col === 'updated_at' ? 'disabled' : ''} />
                    </div>
                `;
            });

            btnSaveForm.onclick = () => saveRecord(columns);
            recordModal.classList.add('active');
        }

        async function saveRecord(columns) {
            const formData = new FormData(recordForm);
            const data = {};
            
            for (let [key, value] of formData) {
                data[key] = value || null;
            }

            try {
                btnSaveForm.disabled = true;
                btnSaveForm.textContent = 'Salvando...';

                if (currentEditingRecord) {
                    // Update
                    await supabase.from(currentTable).update(data).eq('id', currentEditingRecord.id);
                } else {
                    // Create
                    await supabase.from(currentTable).insert([data]);
                }

                await ipcAlert('Salvo com sucesso!');
                recordModal.classList.remove('active');
                viewTable(currentTable);
            } catch (err) {
                await ipcAlert('Erro: ' + err.message);
            } finally {
                btnSaveForm.disabled = false;
                btnSaveForm.textContent = 'Salvar';
            }
        }

        async function deleteRecordHandler(record, tableName) {
            const confirm = await ipcAlert('Tem certeza que deseja deletar este registro?', 'confirm');
            if (!confirm) return;

            try {
                await supabase.from(tableName).delete().eq('id', record.id);
                await ipcAlert('Deletado com sucesso!');
                viewTable(tableName);
            } catch (err) {
                await ipcAlert('Erro: ' + err.message);
            }
        }

        // Make functions global
        window.viewTable = viewTable;
        window.createNewRecord = () => showCreateModal(Object.keys({}));
        window.editRecord = () => {};
        window.deleteRecord = () => {};
    </script>
</body>
</html>
