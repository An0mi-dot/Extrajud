<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTRATJUD - Hub Principal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Theme -->
    <link rel="stylesheet" href="assets/theme.css">
    <script src="assets/theme.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 20px;
            animation: fadeIn 0.6s ease-out;
        }

        .brand-main {
            font-family: 'Rajdhani', sans-serif;
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 8px;
            /* Gradient Text */
            background: linear-gradient(135deg, var(--primary-color) 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 18px;
            margin-bottom: 60px;
            font-weight: 500;
            opacity: 0.8;
        }

        .cards-grid {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hub-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 50px 40px;
            width: 280px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            cursor: pointer;
        }

        .hub-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(16,185,129,0.12);
            border-color: rgba(16,185,129,0.3);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(16,185,129,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 32px;
            color: var(--primary-color);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .hub-card:hover .icon-circle {
            transform: scale(1.15) rotate(5deg);
            background: var(--primary-color);
            color: #fff;
        }

        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .version-tag {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: monospace;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="brand-main">ExtratJud</div>
        <div class="subtitle">Selecione o módulo de trabalho</div>

        <div class="cards-grid">
            <!-- Módulo 1: Robôs (Antigo Hub) -->
            <a href="hub_servicos.html" class="hub-card">
                <div class="icon-circle">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div class="card-title">Robôs</div>
                <div class="card-desc">
                    Automação processual (PROJUDI, PJE) e extração de dados em massa.
                </div>
            </a>

            <!-- Módulo 2: Helpdesk (Novo Hub) -->
            <a href="hub_solicitacoes.html" class="hub-card">
                <div class="icon-circle">
                    <i class="fa-solid fa-folder-tree"></i>
                </div>
                <div class="card-title">Fluxo</div>
                <div class="card-desc">
                    Gestão de demandas jurídicas, ofícios e solicitações internas.
                </div>
            </a>
        </div>
    </div>

    <div class="version-tag">ver 1.2.10</div>

</body>
</html>
