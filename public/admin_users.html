<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTRATJUD - Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/theme.css">
    <script src="assets/theme.js"></script>
    <style>
        .admin-container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .admin-title { font-size: 1.5rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 10px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }

        .table-container { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th, .data-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { background: var(--bg); font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .data-table tr:hover { background: var(--primary-light); }

        .badge { font-family: var(--font-mono); font-size: 0.7rem; padding: 3px 6px; border-radius: 4px; }
        .badge-uuid { background: var(--primary-light); color: var(--primary); }
        .badge-machine { background: var(--border); color: var(--text-secondary); }
        .status-active { color: var(--success); font-weight: 600; }
        .status-inactive { color: var(--danger); opacity: 0.7; }
        .action-btns { display: flex; gap: 4px; }
    </style>
</head>
<body class="fade-in">
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title"><i class="fa-solid fa-users-gear" style="color:var(--primary);"></i> Gerenciar Usuários</h1>
            <button class="btn btn-ghost" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
        </div>

        <div id="message-container"></div>

        <div class="admin-grid">
            <div class="card">
                <h4 style="margin:0 0 4px;"><i class="fa-solid fa-link" style="color:var(--primary);"></i> Reatribuir UUID</h4>
                <p class="text-sm text-muted mb-3">Reatribua o UUID de um usuário para uma nova máquina.</p>
                <div class="input-group mb-2">
                    <label class="input-label">UUID do Usuário</label>
                    <input type="text" id="inp-old-uuid" class="input" placeholder="ex: 550e8400-e29b-...">
                </div>
                <div class="input-group mb-3">
                    <label class="input-label">Novo Machine ID (SHA256)</label>
                    <input type="text" id="inp-new-machine-id" class="input" placeholder="ex: ff6b6b86a...">
                </div>
                <button class="btn btn-primary w-full" onclick="reatribuirUUID()"><i class="fa-solid fa-exchange-alt"></i> Reatribuir</button>
            </div>

            <div class="card">
                <h4 style="margin:0 0 4px;"><i class="fa-solid fa-search" style="color:var(--primary);"></i> Buscar Usuário</h4>
                <p class="text-sm text-muted mb-3">Procure pelo UUID ou Machine ID.</p>
                <div class="input-group mb-3">
                    <label class="input-label">UUID ou Machine ID</label>
                    <input type="text" id="inp-search" class="input" placeholder="Procure...">
                </div>
                <button class="btn btn-primary w-full" onclick="buscarUsuario()"><i class="fa-solid fa-search"></i> Buscar</button>
            </div>
        </div>

        <div class="card table-container">
            <h4 style="margin:0 0 12px;"><i class="fa-solid fa-list" style="color:var(--primary);"></i> Todos os Usuários</h4>
            <div id="loading" style="text-align:center; padding:32px; color:var(--text-muted);">Carregando...</div>
            <table class="data-table" id="users-table" style="display:none;">
                <thead>
                    <tr>
                        <th>Apelido</th><th>UUID</th><th>Machine ID</th><th>Primeiro Acesso</th><th>Último Acesso</th><th>Cargos</th><th>Status</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-reatribuir" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><h3>Confirmar Reatribuição</h3></div>
            <div class="modal-body"><p id="modal-message">Deseja reatribuir este UUID?</p></div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-danger" onclick="confirmarReatribuicao()">Confirmar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './assets/supabaseClient.js';
        window.supabase = supabase;
    </script>
    <script>
        let usuariosCache = [];
        let pendingReatribuicao = null;

        async function carregarUsuarios() {
            try {
                const { data, error } = await supabase.from('v_users_with_roles').select('*').order('last_login', { ascending: false });
                if (error) throw error;
                usuariosCache = data || [];
                renderizarTabela(usuariosCache);
                document.getElementById('loading').style.display = 'none';
            } catch (error) { mostrarErro('Erro ao carregar: ' + error.message); }
        }

        function renderizarTabela(usuarios) {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '';
            if (usuarios.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:32px; color:var(--text-muted);">Nenhum usuário encontrado</td></tr>'; return; }
            usuarios.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong style="color:var(--primary);">${user.employee_name || '—'}</strong></td>
                    <td><span class="badge badge-uuid" title="${user.user_uuid}">${user.user_uuid.substring(0,8)}...</span></td>
                    <td><span class="badge badge-machine" title="${user.machine_identifier}">${user.machine_identifier.substring(0,8)}...</span></td>
                    <td class="text-sm">${new Date(user.first_seen).toLocaleDateString('pt-BR')}</td>
                    <td class="text-sm">${new Date(user.last_login).toLocaleString('pt-BR')}</td>
                    <td class="text-sm">${user.cargos || '—'}</td>
                    <td><span class="${user.user_ativo ? 'status-active' : 'status-inactive'}">${user.user_ativo ? 'Ativo' : 'Inativo'}</span></td>
                    <td><div class="action-btns">
                        <button class="btn btn-ghost btn-sm" onclick="editarNomeUsuario('${user.user_uuid}', '${user.employee_name || ''}')" title="Renomear"><i class="fa-solid fa-id-card"></i></button>
                        <button class="btn btn-ghost btn-sm" onclick="editarUsuario('${user.user_uuid}')" title="Editar"><i class="fa-solid fa-edit"></i></button>
                        <button class="btn btn-danger btn-sm" onclick="desativarUsuario('${user.user_uuid}')" title="Desativar"><i class="fa-solid fa-ban"></i></button>
                    </div></td>`;
                tbody.appendChild(row);
            });
            document.getElementById('users-table').style.display = 'table';
        }

        async function reatribuirUUID() {
            const oldUuid = document.getElementById('inp-old-uuid').value.trim();
            const newMachineId = document.getElementById('inp-new-machine-id').value.trim();
            if (!oldUuid || !newMachineId) { mostrarErro('Preencha todos os campos'); return; }
            pendingReatribuicao = { oldUuid, newMachineId };
            document.getElementById('modal-reatribuir').classList.add('active');
        }

        async function confirmarReatribuicao() {
            if (!pendingReatribuicao) return;
            try {
                const { data, error } = await supabase.rpc('update_user_uuid_manual', { p_old_uuid: pendingReatribuicao.oldUuid, p_new_machine_identifier: pendingReatribuicao.newMachineId });
                if (error) throw error;
                mostrarSucesso('UUID reatribuído com sucesso!');
                document.getElementById('inp-old-uuid').value = '';
                document.getElementById('inp-new-machine-id').value = '';
                fecharModal();
                await carregarUsuarios();
            } catch (error) { mostrarErro('Erro: ' + error.message); }
        }

        async function buscarUsuario() {
            const search = document.getElementById('inp-search').value.trim();
            if (!search) { renderizarTabela(usuariosCache); return; }
            renderizarTabela(usuariosCache.filter(u => u.user_uuid.toLowerCase().includes(search.toLowerCase()) || u.machine_identifier.toLowerCase().includes(search.toLowerCase())));
        }

        async function desativarUsuario(uuid) {
            if (!confirm('Desativar este usuário?')) return;
            try { const { error } = await supabase.from('users_auto').update({ ativo: false }).eq('user_uuid', uuid); if (error) throw error; mostrarSucesso('Usuário desativado!'); await carregarUsuarios(); } catch (error) { mostrarErro('Erro: ' + error.message); }
        }

        function editarUsuario(uuid) {
            const user = usuariosCache.find(u => u.user_uuid === uuid);
            if (user) { document.getElementById('inp-old-uuid').value = uuid; document.getElementById('inp-new-machine-id').focus(); }
        }

        function fecharModal() { document.getElementById('modal-reatribuir').classList.remove('active'); pendingReatribuicao = null; }

        async function editarNomeUsuario(uuid, currentName) {
            const newName = prompt('Digite o apelido:', currentName || '');
            if (newName !== null && newName.trim() !== currentName) {
                try { const { error } = await supabase.from('users_auto').update({ employee_name: newName.trim() }).eq('user_uuid', uuid); if (error) throw error; mostrarSucesso('Nome atualizado!'); carregarUsuarios(); } catch (e) { mostrarErro('Erro: ' + e.message); }
            }
        }

        function mostrarErro(msg) { const c = document.getElementById('message-container'); c.innerHTML = `<div class="alert alert-warning"><i class="fa-solid fa-exclamation-circle"></i> ${msg}</div>`; }
        function mostrarSucesso(msg) { const c = document.getElementById('message-container'); c.innerHTML = `<div class="alert alert-info"><i class="fa-solid fa-check-circle"></i> ${msg}</div>`; setTimeout(() => { c.innerHTML = ''; }, 3000); }

        window.addEventListener('load', carregarUsuarios);
    </script>
</body>
</html>
