<!-- Backup of existing intro/loading overlay from hub_servicos.html -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup - Intro Overlay</title>
<style>
    /* Intro overlay styles (copied from hub_servicos) */
    :root { --primary-color: #10b981; --bg-color:#f8fafc; }
    #intro-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-color: var(--bg-color);
        display: flex; align-items: center; justify-content: center; z-index:9999;
        transition: opacity 0.8s ease-in-out;
    }
    #intro-overlay.fade-out { opacity: 0; pointer-events: none; }
    .intro-content { text-align:center; display:flex; flex-direction:column; align-items:center; gap:20px; }
    .intro-logo { width:80px; height:80px; color:var(--primary-color); }
    .intro-bar { width:200px; height:4px; background:rgba(0,0,0,0.04); border-radius:2px; overflow:hidden; }
    .intro-progress { width:0%; height:100%; background:var(--primary-color); animation:progress-fill 2.5s ease-in-out forwards; }
    @keyframes progress-fill { 0%{width:0} 50%{width:40%} 80%{width:70%} 100%{width:100%} }
    .intro-status { font-family: monospace; color:#546; }
</style>
</head>
<body>
<div id="intro-overlay">
    <div class="intro-content">
        <div class="intro-logo"><img src="assets/logo.png" alt="Logo" style="width:100%;height:100%;object-fit:contain"></div>
        <div class="intro-title">EXTRATJUD</div>
        <div class="intro-bar"><div class="intro-progress"></div></div>
        <div class="intro-status">Inicializando sistema...</div>
    </div>
</div>
</body>
</html>
